# Worker always-on (WhatsApp via Baileys). Opcional para rodar local com Docker.
# Em produção, prefira Railway/Render/Fly apontando para o worker.Dockerfile.
# As sessões do WhatsApp são persistidas no Supabase (não precisa de volume).
services:
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY}
      - WORKER_SHARED_TOKEN=${WORKER_SHARED_TOKEN}
      - PORT=8080
    ports:
      - "8080:8080"
